name: ELIXOR — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend CI ───────────────────────────────────────────────
  backend-test:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check src/server.js

  # ── Frontend Build ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Deploy Frontend → Vercel ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # Map secrets to env so we can check them in step-level conditions
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice (secrets not configured)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️  VERCEL_TOKEN secret is not set."
          echo "Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to GitHub repo secrets to enable auto-deploy."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Download dist artifact
        if: env.VERCEL_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  # ── Deploy Backend → Render ───────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    needs: [backend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
    steps:
      - name: Skip notice (hook not configured)
        if: env.RENDER_DEPLOY_HOOK == ''
        run: |
          echo "⚠️  RENDER_DEPLOY_HOOK secret is not set."
          echo "Add it in GitHub repo secrets to enable auto-deploy to Render."

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          echo "Render webhook HTTP $STATUS"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] || exit 1
