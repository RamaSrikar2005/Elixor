name: ELIXOR — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend CI ───────────────────────────────────────────────
  backend-test:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check src/server.js

  # ── Frontend Build ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # Set VITE_API_URL to your Droplet backend URL in GitHub secrets
          # e.g.  http://YOUR_DROPLET_IP:5001/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Deploy Frontend → Vercel ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Notice — Vercel secrets not configured
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️  VERCEL_TOKEN is not set. Add these to GitHub repo secrets:"
          echo "   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
          echo "   Skipping Vercel deployment."

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Download dist artifact
        if: env.VERCEL_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        working-directory: frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  # ── Deploy Backend → DigitalOcean Droplet (SSH) ───────────────
  deploy-backend:
    name: Deploy Backend (DigitalOcean)
    needs: [backend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DO_HOST: ${{ secrets.DO_HOST }}
      DO_USER: ${{ secrets.DO_USER }}
      DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
    steps:
      - name: Notice — DigitalOcean secrets not configured
        if: env.DO_HOST == ''
        run: |
          echo "⚠️  DO_HOST is not set. Add these to GitHub repo secrets:"
          echo "   DO_HOST  — your Droplet IP or hostname"
          echo "   DO_USER  — SSH user (usually 'root' or your username)"
          echo "   DO_SSH_KEY — private SSH key that can access the Droplet"
          echo "   Skipping backend deployment."

      - name: Deploy via SSH
        if: env.DO_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /root/auramain          # change this to wherever you cloned the repo
            git pull origin main

            echo "=== Installing backend dependencies ==="
            cd backend
            npm ci --omit=dev

            echo "=== Restarting backend (pm2) ==="
            pm2 restart elixor-backend || pm2 start src/server.js --name elixor-backend
            pm2 save

            echo "=== Deploy complete ==="
